<script>
// params
function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

document.getElementById("question").innerText =
  getParam("q") || "Will you say YES? 😏";

document.getElementById("sender").innerText =
  "From: " + (getParam("s") || "Someone");

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const counter = document.getElementById("counter");
const fake = document.getElementById("fake");

const sounds = [
  document.getElementById("s1"),
  document.getElementById("s2"),
  document.getElementById("s3")
];

let noClicks = 0;
let yesScale = 1;

// fake counter
let fakeCount = Math.floor(Math.random()*200 + 50);
fake.innerText = fakeCount + " people failed before you 😂";

// 🔥 MOVE FUNCTION (important fix)
function moveNo(){
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 60);

  noBtn.style.position = "absolute";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

// ❌ NO click
noBtn.addEventListener("click", (e) => {
  e.preventDefault();
  e.stopPropagation();

  noClicks++;
  counter.innerText = "Attempts: " + noClicks;

  // 🔊 sound
  const snd = sounds[Math.floor(Math.random()*sounds.length)];
  snd.volume = Math.min(1, 0.2 + noClicks*0.02);
  snd.currentTime = 0;
  snd.play();

  // 📳 vibration
  if(navigator.vibrate){
    navigator.vibrate(80);
  }

  // ✅ PHASE 1 (1–5)
  if(noClicks <= 5){
    noBtn.style.transform = `scale(${1 - noClicks*0.15})`;
    return;
  }

  // ✅ PHASE 2 (6–50)
  if(noClicks <= 50){
    yesScale += 0.04; // slower smooth growth
    yesBtn.style.transform = `scale(${yesScale})`;

    moveNo(); // 🔥 FIX → move on click
    return;
  }

  // ✅ PHASE 3 (trap)
  const rect = yesBtn.getBoundingClientRect();
  noBtn.style.position = "absolute";
  noBtn.style.left = rect.left + "px";
  noBtn.style.top = rect.top + "px";
  noBtn.style.opacity = 0.05;

  noBtn.onclick = sayYes;
});

// 🔥 ALSO move on hover (desktop bonus)
noBtn.addEventListener("mouseover", () => {
  if(noClicks > 5 && noClicks <= 50){
    moveNo();
  }
});

// YES
function sayYes(){
  document.body.innerHTML = `
    <h1 style="color:#ff4d6d">😂 I KNEW IT!</h1>
    <p>You can't escape 😈</p>
  `;
}

yesBtn.onclick = sayYes;

</script>
