<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Try Saying No 😈</title>

<style>
body{
  font-family: Arial;
  background:#ffe6ea;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  text-align:center;
  overflow:hidden;
}

.card{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

button{
  padding:12px 25px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  position:relative;
}

#yes{
  background:#ff4d6d;
  color:white;
  z-index:1;
}

#no{
  background:#4361ee;
  color:white;
  z-index:2;
}

#counter{
  margin-top:10px;
  font-size:14px;
  color:#888;
}

#fake{
  margin-top:5px;
  font-size:14px;
  color:#ff4d6d;
}
</style>
</head>

<body>

<div class="card">
  <h2 id="question">Loading...</h2>
  <p id="sender"></p>

  <button id="yes">YES 😍</button>
  <button id="no">NO 😒</button>

  <div id="counter"></div>
  <div id="fake"></div>
</div>

<!-- 🔊 Sounds -->
<audio id="s1" src="https://www.myinstants.com/media/sounds/boing.mp3"></audio>
<audio id="s2" src="https://www.myinstants.com/media/sounds/vine-boom.mp3"></audio>
<audio id="s3" src="https://www.myinstants.com/media/sounds/sad-trombone.mp3"></audio>

<script>
// 🔗 Params
function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

document.getElementById("question").innerText =
  getParam("q") || "Will you say YES? 😏";

document.getElementById("sender").innerText =
  "From: " + (getParam("s") || "Someone");

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const counter = document.getElementById("counter");
const fake = document.getElementById("fake");

const sounds = [
  document.getElementById("s1"),
  document.getElementById("s2"),
  document.getElementById("s3")
];

let noClicks = 0;
let yesScale = 1;

// fake counter
let fakeCount = Math.floor(Math.random()*200 + 50);
fake.innerText = fakeCount + " people failed before you 😂";

// 🔥 movement function
function moveNo(){
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 60);

  noBtn.style.position = "absolute";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

// ❌ NO click
noBtn.addEventListener("click", (e) => {
  e.preventDefault();
  e.stopPropagation();

  noClicks++;
  counter.innerText = "Attempts: " + noClicks;

  // 🔊 sound
  const snd = sounds[Math.floor(Math.random()*sounds.length)];
  snd.volume = Math.min(1, 0.2 + noClicks*0.02);
  snd.currentTime = 0;
  snd.play();

  // 📳 vibration
  if(navigator.vibrate){
    navigator.vibrate(80);
  }

  // ✅ Phase 1 (1–5)
  if(noClicks <= 5){
    noBtn.style.transform = `scale(${1 - noClicks*0.15})`;
    return;
  }

  // ✅ Phase 2 (6–50)
  if(noClicks <= 50){
    yesScale += 0.04;
    yesBtn.style.transform = `scale(${yesScale})`;

    moveNo(); // 🔥 important
    return;
  }

  // ✅ Phase 3 (trap)
  const rect = yesBtn.getBoundingClientRect();
  noBtn.style.position = "absolute";
  noBtn.style.left = rect.left + "px";
  noBtn.style.top = rect.top + "px";
  noBtn.style.opacity = 0.05;

  noBtn.onclick = sayYes;
});

// 🔥 hover support (desktop)
noBtn.addEventListener("mouseover", () => {
  if(noClicks > 5 && noClicks <= 50){
    moveNo();
  }
});

// YES
function sayYes(){
  document.body.innerHTML = `
    <h1 style="color:#ff4d6d">😂 I KNEW IT!</h1>
    <p>You can't escape 😈</p>
  `;
}

yesBtn.onclick = sayYes;

</script>

</body>
</html>
